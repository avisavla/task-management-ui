<div style="background-color: rgb(220, 164, 220); min-height: 100vh;">
<h2>Tasks</h2>

<mat-progress-spinner *ngIf="isLoading" mode="indeterminate">
</mat-progress-spinner>

<div *ngIf="!isLoading && tasks.length==0">
    No Tasks found
</div>

<div class="container" *ngIf="!isLoading && tasks.length>0">

    <button (click)="prevPage()" [disabled]="pageNo==1">Previous Page</button>
    <span>Page {{pageNo}}</span>
    <button (click)="nextPage()" [disabled]="pageNo*pageSize>=totalCount">Next Page</button>

    <select [(ngModel)]="pageSize" (change)="loadTasks()">
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="20">20</option>
    </select>
    <p>Showing {{showingCount}} out of {{totalCount}}</p>

    <br>

    <select [(ngModel)]="status" (change)="loadTasks()">
        <option value="Pending">Pending</option>
        <option value="InProgress">InProgress</option>
        <option value="Completed">Completed</option>
    </select>

    <br>

    <textarea [(ngModel)]="text" (change)="loadTasks()" placeholder="Enter text to filter"></textarea>

    <br>
    <button (click)="createTask()">Create</button>

    <p style="color: red;" *ngIf="deleteErrorMessage">{{deleteErrorMessage}}</p>

    <div class="row">
        <div *ngFor="let task of tasks" class="col-lg-4 col-md-6 mb-4">
             <div class="card shadow w-100 border">
                <div class="card-header text-center" style="background-color:lightblue;">
                    <p class="card-title text-center" style="margin-bottom: 0px;">{{task.name}}</p>
                </div>
                <div class="card-body">
                    <div class="card-text text-center task-desc">{{task.description}}</div>
                    <br>
                    <div class="button-container">
                        <button class="btn btn-info">{{task.status}}</button>
                        <button class="btn btn-primary" (click)="OpenProjectModal(task)">View More</button>
                        <button class="btn btn-warning" (click)="editTask(task.id)">Edit</button>
                        <button class="btn btn-danger" (click)="deleteTask(task.id,task.name)">Delete</button>
                    </div>
                </div>
        </div>
    </div>

</div>
</div>
